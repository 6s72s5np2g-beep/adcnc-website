<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#001f4d"/>
      <stop offset="60%" stop-color="#003a8c"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <radialGradient id="glow" cx="80%" cy="20%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- AD logo -->
  <rect x="80" y="80" width="120" height="120" rx="22" fill="#ffffff"/>
  <text x="140" y="170" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="64" font-weight="900" fill="#003a8c" text-anchor="middle" letter-spacing="-3">AD</text>

  <!-- 公司名 -->
  <text x="80" y="290" font-family="'Noto Sans TC',sans-serif" font-size="60" font-weight="900" fill="#ffffff" letter-spacing="2">銨東股份有限公司</text>

  <!-- 主標 -->
  <text x="80" y="385" font-family="'Noto Sans TC',sans-serif" font-size="76" font-weight="900" fill="#f59e0b" letter-spacing="3">精密加工 · 即刻交付</text>

  <!-- 加工項目 -->
  <text x="80" y="465" font-family="'Noto Sans TC',sans-serif" font-size="32" font-weight="500" fill="rgba(255,255,255,0.92)" letter-spacing="1">車銑複合 ｜ 五軸加工 ｜ 三軸／四軸銑床 ｜ CNC 車床</text>

  <!-- 副資訊 -->
  <text x="80" y="520" font-family="'Noto Sans TC',sans-serif" font-size="24" font-weight="400" fill="rgba(255,255,255,0.75)">台中太平 · 累積二十餘年精密 CNC 加工經驗</text>

  <!-- 網址 -->
  <text x="80" y="585" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="28" font-weight="600" fill="#f59e0b">adcnc.com.tw</text>

  <!-- 右側裝飾 -->
  <g opacity="0.15" transform="translate(950, 280)">
    <circle cx="80" cy="80" r="80" fill="none" stroke="#ffffff" stroke-width="2"/>
    <circle cx="80" cy="80" r="60" fill="none" stroke="#ffffff" stroke-width="2"/>
    <circle cx="80" cy="80" r="40" fill="none" stroke="#ffffff" stroke-width="2"/>
    <line x1="0" y1="80" x2="160" y2="80" stroke="#ffffff" stroke-width="2"/>
    <line x1="80" y1="0" x2="80" y2="160" stroke="#ffffff" stroke-width="2"/>
  </g>
</svg>
